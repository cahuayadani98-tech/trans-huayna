<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gris-mate: #374151; 
            --amarillo: #facc15; 
            --blanco: #ffffff; 
            --fondo-app: #111827; 
            --azul-corporativo: #1e40af;
            --rojo-error: #ef4444;
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--fondo-app); font-family: 'Plus Jakarta Sans', sans-serif; color: white; padding: 15px; }

        /* --- BOTÓN MENÚ --- */
        .btn-menu-float {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            background: var(--blanco); border: none; width: 50px; height: 50px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; color: var(--gris-mate);
            cursor: pointer;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: #ffffff; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1100; display: flex; flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .sidebar.active { left: 0; }
        .nav-link { display: flex; align-items: center; text-decoration: none; color: #4b5563; padding: 18px 25px; font-weight: 700; font-size: 14px; transition: 0.3s; }
        .nav-link svg { margin-right: 15px; } 
        .nav-link.active { background: #f9fafb; color: #1f2937; }

        .btn-logout { margin-top: auto; border-top: 1px solid #f3f4f6; color: var(--rojo-error) !important; padding: 25px !important; }
        .btn-logout svg { color: var(--rojo-error); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1050; }
        .sidebar.active + .overlay { display: block; }

        /* --- TÍTULO --- */
        .header-container {
            margin: 80px auto 30px;
            max-width: 1200px; text-align: left; padding: 0 10px; border-left: 5px solid var(--amarillo);
        }
        .header-container h1 { margin: 0; font-size: 28px; font-weight: 800; background: linear-gradient(to right, #ffffff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-container p { margin: 5px 0 0; color: var(--amarillo); font-weight: 700; font-size: 12px; text-transform: uppercase; letter-spacing: 4px; }

        /* --- TABLA --- */
        .tabla-scroll-container { background: white; border-radius: 12px; overflow-x: auto; width: 100%; max-width: 1200px; margin: 0 auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; color: #1f2937; }
        thead th { background: #334155; color: white; padding: 14px; font-size: 10px; text-transform: uppercase; text-align: left; }
        tbody td { padding: 14px; border-bottom: 1px solid #e2e8f0; font-size: 13px; font-weight: 600; }
        
        .badge-camion { background: #f1f5f9; padding: 4px 8px; border-radius: 6px; font-size: 11px; border: 1px solid #cbd5e1; }

        /* --- ACCIONES --- */
        .acciones-container { display: flex; gap: 8px; }
        .btn-accion {
            width: 38px; height: 38px; border: none; border-radius: 10px; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            transition: 0.2s;
        }
        .btn-print { background: #dbeafe; color: var(--azul-corporativo); }
        .btn-print:hover { background: var(--azul-corporativo); color: white; }
        .btn-delete { background: #fee2e2; color: var(--rojo-error); }
        .btn-delete:hover { background: var(--rojo-error); color: white; }
    </style>
</head>
<body>

    <button class="btn-menu-float" onclick="toggleMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <nav class="sidebar" id="sidebar">
        <div style="padding: 40px 25px 20px;"></div>
        <div style="flex: 1;">
            <a href="dashboard.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>INICIO</a>
            <a href="carga.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path></svg>REGISTRO DE CARGA</a>
            <a href="camiones.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>CONTROL CAMIONES</a>
            <a href="guias.html" class="nav-link active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path></svg>HISTORIAL GUÍAS</a>
            <a href="reportes.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>REPORTE MENSUAL</a>
        </div>
        <a href="index.html" class="nav-link btn-logout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            CERRAR SESIÓN
        </a>
    </nav>
    <div class="overlay" onclick="toggleMenu()"></div>

    <header class="header-container">
        <h1>Historial de Guías</h1>
        <p>Trans Huayna Kapac SRL</p>
    </header>

    <div class="tabla-scroll-container">
        <table>
            <thead>
                <tr>
                    <th>N° Guía</th>
                    <th>Fecha</th>
                    <th>Remitente</th>
                    <th>Consignatario</th>
                    <th>Destino</th>
                    <th>Unidad</th>
                    <th>Total (Bs)</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCjXNx1UB2I7mt_JUpBr4E05hJuFJWL6k4", 
            authDomain: "trans-huayna-kapac.firebaseapp.com", 
            projectId: "trans-huayna-kapac", 
            databaseURL: "https://trans-huayna-kapac-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        onValue(ref(db, 'registros_carga'), (snapshot) => {
            const tbody = document.getElementById("tbody");
            tbody.innerHTML = "";
            if (snapshot.exists()) {
                const entries = Object.entries(snapshot.val()).reverse();
                entries.forEach(([id, g]) => {
                    const row = document.createElement("tr");
                    row.innerHTML = `
                        <td style="color:#1e40af; font-weight:800;">#${g.n_guia}</td>
                        <td>${g.fecha}</td>
                        <td>${g.remitente}</td>
                        <td>${g.consignatario}</td>
                        <td>${g.destino || '---'}</td>
                        <td><span class="badge-camion">${g.camion || 'ALMACÉN'}</span></td>
                        <td style="font-weight:800;">Bs. ${parseFloat(g.total).toFixed(2)}</td>
                        <td>
                            <div class="acciones-container">
                                <button class="btn-accion btn-print" onclick='reimprimirGuia(${JSON.stringify(g)})' title="Imprimir Guía">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                                </button>
                                <button class="btn-accion btn-delete" onclick="eliminarRegistro('${id}', '${g.n_guia}')" title="Eliminar">
                                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                                </button>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }
        });

        window.eliminarRegistro = function(id, nGuia) {
            if(confirm(`⚠️ ¿Deseas eliminar la Guía N° ${nGuia}?`)) {
                remove(ref(db, `registros_carga/${id}`)).then(() => alert("Registro eliminado."));
            }
        };

        window.reimprimirGuia = function(d) {
            const win = window.open('', '', 'width=650,height=850');
            const unidadFinal = (d.camion && d.camion !== "undefined") ? d.camion : "ALMACÉN / POR ASIGNAR";
            
            win.document.write(`
                <html><body style="font-family:sans-serif; padding:40px; color:#333;">
                    <div style="text-align:center; border:2px solid #000; padding:15px; margin-bottom:20px;">
                        <h2 style="margin:0;">TRANS HUAYNA KAPAC SRL</h2>
                        <small style="text-transform: uppercase; letter-spacing: 2px;">Logística y Transporte</small>
                    </div>
                    <h3 style="text-align:center; text-transform: uppercase;">GUÍA DE CARGA N° ${d.n_guia}</h3>
                    <p><strong>Fecha:</strong> ${d.fecha}</p>
                    <p><strong>Destino:</strong> ${d.destino || 'CENTRAL'}</p>
                    <p><strong>Unidad:</strong> ${unidadFinal}</p>
                    <hr>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
                        <div><p><strong>REMITENTE:</strong><br>${d.remitente}<br>CI: ${d.ci_remitente || '---'}</p></div>
                        <div><p><strong>CONSIGNATARIO:</strong><br>${d.consignatario}<br>CI: ${d.ci_consignatario || '---'}</p></div>
                    </div>
                    <hr>
                    <p><strong>DETALLE DE MERCADERÍA:</strong></p>
                    <p style="background:#f9f9f9; padding:15px; border-radius:5px; min-height:100px; font-weight: 600;">${d.producto}</p>
                    <h2 style="text-align:right; border-top:1px solid #eee; padding-top:10px;">TOTAL: Bs. ${parseFloat(d.total).toFixed(2)}</h2>
                    <br><br><br>
                    <div style="display:flex; justify-content:space-between; margin-top:50px;">
                        <div style="border-top:1px solid #000; width:220px; text-align:center;"><br>Firma Despacho</div>
                        <div style="border-top:1px solid #000; width:220px; text-align:center;"><br>Firma Recepción</div>
                    </div>
                </body></html>
            `);
            win.document.close();
            setTimeout(() => { win.print(); win.close(); }, 500);
        };

        window.toggleMenu = function() { document.getElementById('sidebar').classList.toggle('active'); };
    </script>
</body>
</html>
