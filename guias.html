<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro de Carga - TRANS CK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #537d8f; --celeste: #8ac9d8; --texto: #2a3b4e; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: #f4f7f6; color: var(--texto); }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .btn-back { text-decoration: none; font-size: 24px; color: var(--azul); margin-right: 15px; }
        
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        label { display: block; font-size: 12px; font-weight: 700; color: var(--azul); margin-top: 15px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-family: 'Inter'; }
        
        .btn-registrar { width: 100%; margin-top: 25px; padding: 15px; background: var(--azul); color: white; border: none; border-radius: 12px; font-weight: 800; font-size: 16px; }
        
        /* Lista de guías recientes */
        .recientes { margin-top: 30px; }
        .guia-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 10px; border-left: 5px solid var(--celeste); }
        .guia-item h4 { margin: 0; font-size: 16px; }
        .guia-item p { margin: 5px 0 0; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="header">
    <a href="menu.html" class="btn-back">←</a>
    <h1 style="font-size: 20px; margin:0;">Registro de Carga</h1>
</div>

<div class="card">
    <label>Cliente / Empresa</label>
    <input type="text" id="cliente" placeholder="Ej: Aceros S.A.">

    <label>Producto / Mercadería</label>
    <textarea id="producto" rows="2" placeholder="Describa la carga..."></textarea>

    <label>Cantidad / Peso</label>
    <input type="text" id="cantidad" placeholder="Ej: 20 Toneladas / 500 bultos">

    <label>Destino</label>
    <input type="text" id="destino" placeholder="Ciudad o Dirección">

    <label>Asignar Camión</label>
    <select id="camionSelect">
        <option value="">Seleccione un camión...</option>
    </select>

    <button class="btn-registrar" id="btnGuardarGuia">REGISTRAR CARGA</button>
</div>

<div class="recientes">
    <h3 style="font-size: 14px; color: #888;">REGISTROS RECIENTES</h3>
    <div id="listaGuias"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBtiw8MM-kchif6lCBJkjh9fVfWAAPxqaE",
        authDomain: "registro-8f26e.firebaseapp.com",
        projectId: "registro-8f26e",
        appId: "1:62551766112:web:e59e4b444591a0e7737f05"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Cargar camiones en el SELECT automáticamente
    onSnapshot(collection(db, "camiones"), (snap) => {
        const select = document.getElementById('camionSelect');
        select.innerHTML = '<option value="">Seleccione un camión...</option>';
        snap.forEach(doc => {
            const t = doc.data();
            select.innerHTML += `<option value="${t.placa}">${t.placa} - ${t.chofer}</option>`;
        });
    });

    // Guardar la Guía/Producto
    document.getElementById('btnGuardarGuia').addEventListener('click', async () => {
        const cliente = document.getElementById('cliente').value;
        const producto = document.getElementById('producto').value;
        const cantidad = document.getElementById('cantidad').value;
        const destino = document.getElementById('destino').value;
        const camion = document.getElementById('camionSelect').value;

        if(!cliente || !producto || !camion) return alert("Por favor, llena los datos principales");

        await addDoc(collection(db, "guias"), {
            cliente, producto, cantidad, destino, camion,
            fecha: new Date().toLocaleString(),
            timestamp: Date.now()
        });

        alert("Carga registrada con éxito");
        document.querySelectorAll('input, textarea').forEach(i => i.value = "");
    });

    // Mostrar registros recientes
    const q = query(collection(db, "guias"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snap) => {
        const lista = document.getElementById('listaGuias');
        lista.innerHTML = "";
        snap.forEach(doc => {
            const g = doc.data();
            lista.innerHTML += `
                <div class="guia-item">
                    <h4>${g.cliente}</h4>
                    <p><b>Carga:</b> ${g.producto} (${g.cantidad})</p>
                    <p><b>Camión:</b> ${g.camion} | <b>Destino:</b> ${g.destino}</p>
                    <p style="font-size:10px; color:var(--azul);">${g.fecha}</p>
                </div>`;
        });
    });
</script>
</body>
</html>
