<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gris-mate: #374151; --amarillo: #facc15; --blanco: #ffffff; }
        body { margin: 0; padding: 20px; background: #1f2937; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; }
        
        .card { background: var(--blanco); padding: 25px; border-radius: 24px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); position: relative; }
        .numero-guia { position: absolute; top: 20px; right: 25px; background: #f3f4f6; padding: 5px 12px; border-radius: 8px; font-weight: 800; font-size: 12px; color: var(--gris-mate); }
        
        h2 { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 20px 0; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .head-icon { width: 18px; height: 18px; color: #9ca3af; stroke-width: 2.5; }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #4b5563; margin-bottom: 5px; margin-left: 5px; }
        
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e5e7eb; background: #f9fafb; box-sizing: border-box; font-family: inherit; font-size: 14px; outline: none; }
        select { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 15px center; background-size: 15px; }

        .btn-elegant { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 800; background: var(--amarillo); color: #1f2937; cursor: pointer; transition: 0.2s; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-elegant:active { transform: scale(0.96); }

        .total-display { background: #1f2937; color: var(--amarillo); padding: 15px; border-radius: 12px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="numero-guia">GUÍA N°: <span id="num-guia">00155</span></div>
            <h2>
                <svg class="head-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                DATOS DEL CLIENTE
            </h2>
            <div class="input-group"><label>REMITENTE</label><input type="text" id="rem"></div>
            <div class="input-group"><label>CONSIGNATARIO</label><input type="text" id="cons"></div>
        </div>

        <div class="card">
            <h2>
                <svg class="head-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 16v3H5v-3"/><path d="M17 12H7"/><path d="M21 8l-2-2H5L3 8v8h18V8z"/></svg>
                ASIGNACIÓN DE TRANSPORTE
            </h2>
            <div class="input-group">
                <label>SELECCIONAR CAMIÓN DISPONIBLE</label>
                <select id="camion-select">
                    </select>
            </div>
        </div>

        <div class="card">
            <h2>
                <svg class="head-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                DETALLE DE CARGA
            </h2>
            <div class="input-group"><label>PRODUCTO</label><input type="text" id="prod"></div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;"><label>CANTIDAD</label><input type="number" id="cant" oninput="calcular()"></div>
                <div class="input-group" style="flex: 1;"><label>PRECIO UNIT.</label><input type="number" id="precio" oninput="calcular()"></div>
            </div>
            <div class="total-display">
                <p style="margin:0; font-size: 10px; letter-spacing: 2px;">TOTAL NETO (BS)</p>
                <h3 style="margin:0; font-size: 24px;">Bs. <span id="monto-total">0.00</span></h3>
            </div>
        </div>

        <button class="btn-elegant" onclick="imprimirYDespachar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            IMPRIMIR Y DESPACHAR
        </button>
        
        <button class="btn-elegant" style="background: transparent; color: var(--amarillo); border: 2px solid var(--amarillo);" onclick="location.href='menu.html'">
            ← VOLVER AL PANEL
        </button>
    </div>

    <script>
        function calcular() {
            const c = document.getElementById('cant').value || 0;
            const p = document.getElementById('precio').value || 0;
            document.getElementById('monto-total').innerText = (c * p).toFixed(2);
        }

        function cargarCamiones() {
            const flota = JSON.parse(localStorage.getItem('flota')) || [];
            const select = document.getElementById('camion-select');
            const disponibles = flota.filter(c => c.estado === 'disponible');
            
            if(disponibles.length === 0) {
                select.innerHTML = '<option value="">No hay unidades libres</option>';
            } else {
                select.innerHTML = '<option value="">-- Seleccionar Placa --</option>' + 
                    disponibles.map(c => `<option value="${c.placa}">${c.placa} - ${c.chofer}</option>`).join('');
            }
        }

        function imprimirYDespachar() {
            const placa = document.getElementById('camion-select').value;
            if(!placa) return alert("Asigne un camión para continuar.");

            let flota = JSON.parse(localStorage.getItem('flota')) || [];
            const idx = flota.findIndex(c => c.placa === placa);
            if(idx !== -1) {
                flota[idx].estado = 'ruta'; // Cambia el estado internamente
                localStorage.setItem('flota', JSON.stringify(flota));
            }

            alert("Unidad " + placa + " despachada correctamente.");
            location.reload();
        }

        cargarCamiones();
    </script>
</body>
</html>
