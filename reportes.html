<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyBtiw8MM-kchif6lCBJkjh9fVfWAAPxqaE", 
        authDomain: "registro-8f26e.firebaseapp.com", 
        projectId: "registro-8f26e", 
        appId: "1:62551766112:web:e59e4b444591a0e7737f05" 
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let masterData = []; // Fuente de verdad para el Excel

    onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });

    // Carga de datos optimizada
    onSnapshot(query(collection(db, "servicios"), orderBy("fecha", "desc")), (snap) => {
        masterData = [];
        snap.forEach(d => {
            const data = d.data();
            masterData.push({ id: d.id, ...data });
        });
        renderTable();
    });

    window.renderTable = () => {
        const queryBusq = document.getElementById('search').value.toLowerCase();
        const body = document.getElementById('tableBody');
        let sum = 0;
        body.innerHTML = "";

        // Filtramos datos para mostrar y para tener lista la exportación
        masterData.forEach(d => {
            const itemsDetalle = (d.items || []).map(i => i.nombre).join(" ").toLowerCase();
            const cliente = (d.remitente || "").toLowerCase();
            
            if (cliente.includes(queryBusq) || itemsDetalle.includes(queryBusq)) {
                sum += (d.total || 0);
                const itemsStr = (d.items || []).map(i => `${i.cant}x ${i.nombre}`).join(", ");
                
                body.innerHTML += `
                    <tr>
                        <td style="color:#64748b;">${new Date(d.fecha).toLocaleDateString()}</td>
                        <td><span class="tag-guia">${d.nroGuia}</span></td>
                        <td class="client-cell"><b>${d.remitente}</b><small>${itemsStr}</small></td>
                        <td style="font-weight:800;">Bs.${(d.total || 0).toFixed(2)}</td>
                        <td><button class="btn-action-del" onclick="softDelete('${d.id}')">Eliminar</button></td>
                    </tr>`;
            }
        });
        document.getElementById('totalView').innerText = `Bs. ${sum.toFixed(2)}`;
    };

    // FUNCIÓN DE EXCEL CORREGIDA
    document.getElementById('xlsxOut').onclick = () => {
        const queryBusq = document.getElementById('search').value.toLowerCase();
        const reportDate = new Date().toLocaleString();
        
        // 1. Definir encabezados profesionales
        const excelRows = [
            ["TRANS CK - SISTEMA DE CONTROL LOGÍSTICO"],
            ["REPORTE DE AUDITORÍA DE CARGA"],
            ["Generado el:", reportDate],
            [""],
            ["FECHA", "GUÍA", "FACTURA", "CLIENTE", "DESTINO", "TOTAL (BS)", "DETALLE DE PRODUCTOS"]
        ];

        // 2. Filtrar los mismos datos que hay en pantalla para el Excel
        masterData.forEach(d => {
            const itemsDetalle = (d.items || []).map(i => i.nombre).join(" ").toLowerCase();
            const cliente = (d.remitente || "").toLowerCase();

            if (cliente.includes(queryBusq) || itemsDetalle.includes(queryBusq)) {
                const productosTexto = (d.items || []).map(i => `${i.cant} ${i.nombre}`).join(" | ");
                excelRows.push([
                    new Date(d.fecha).toLocaleDateString(),
                    d.nroGuia,
                    d.nroFactura || "S/F",
                    d.remitente,
                    d.destino,
                    d.total,
                    productosTexto
                ]);
            }
        });

        // 3. Generar archivo
        const worksheet = XLSX.utils.aoa_to_sheet(excelRows);
        const workbook = XLSX.utils.book_new();
        
        // Ajuste de anchos de columna
        worksheet['!cols'] = [{wch:12}, {wch:10}, {wch:12}, {wch:25}, {wch:15}, {wch:12}, {wch:50}];

        XLSX.utils.book_append_sheet(workbook, worksheet, "Auditoria_Carga");
        XLSX.writeFile(workbook, `TRANS_CK_Audit_${Date.now()}.xlsx`);
    };
</script>
