<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte Inteligente - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --amarillo: #facc15; 
            --fondo-app: #111827; 
            --verde-exito: #10b981;
            --azul: #3b82f6;
            --gris-mate: #374151; 
            --blanco: #ffffff; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--fondo-app); font-family: 'Plus Jakarta Sans', sans-serif; color: white; padding: 15px; }

        /* --- MENU & HEADER --- */
        .btn-menu-float {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            background: var(--blanco); border: none; width: 50px; height: 50px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; color: var(--gris-mate);
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .btn-menu-float:active { transform: scale(0.9); background: #f3f4f6; }

        .sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: #ffffff; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1100; display: flex; flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .sidebar.active { left: 0; }

        .nav-link { 
            display: flex; align-items: center; text-decoration: none; 
            color: #4b5563; padding: 20px 25px; font-weight: 700; 
            font-size: 14px; letter-spacing: 0.5px; transition: 0.3s;
        }
        .nav-link svg { margin-right: 15px; color: #4b5563; }
        .nav-link:active, .nav-link.active { background: #f9fafb; color: #1f2937; }
        .btn-logout { margin-top: auto; border-top: 1px solid #f3f4f6; color: #ef4444 !important; padding: 25px !important; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1050; }
        .sidebar.active + .overlay { display: block; }

        .header-container {
            margin: 80px auto 30px;
            max-width: 1200px;
            text-align: left;
            padding: 0 10px;
            border-left: 5px solid var(--amarillo);
        }
        .header-container h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(to right, #ffffff, #9ca3af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-container p {
            margin: 5px 0 0;
            color: var(--amarillo);
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        /* --- NUEVA BARRA DE FILTROS & ACCIONES --- */
        .filter-section {
            max-width: 1200px;
            margin: 0 auto 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-container {
            flex: 1;
            min-width: 280px;
            position: relative;
        }
        
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }
        
        .search-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: #1f2937;
            color: white;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            transition: 0.2s;
        }
        .search-input:focus { border-color: var(--amarillo); background: #26323f; }

        .btn-print-report {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--amarillo);
            color: #1f2937;
            padding: 15px 25px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            font-size: 14px;
            transition: 0.1s;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-print-report:active { transform: scale(0.96); opacity: 0.9; }

        /* --- TARJETAS RESUMEN (KPIs) --- */
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px; max-width: 1200px; margin: 0 auto 25px;
        }
        .stat-card {
            background: #1f2937; border-radius: 20px; padding: 20px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .stat-card h3 { margin: 0; font-size: 10px; text-transform: uppercase; color: #9ca3af; letter-spacing: 1px; }
        .stat-card p { margin: 10px 0 0; font-size: 22px; font-weight: 800; color: var(--amarillo); }
        .stat-card.money p { color: var(--verde-exito); }

        /* --- TABLA --- */
        .tabla-container { 
            background: white; border-radius: 20px; overflow-x: auto; 
            max-width: 1200px; margin: 0 auto; box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; color: #1f2937; }
        thead th { background: #374151; color: white; padding: 15px; font-size: 11px; text-transform: uppercase; text-align: left; }
        tbody td { padding: 15px; border-bottom: 1px solid #f3f4f6; font-size: 13px; font-weight: 600; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .badge-camion { background: #eff6ff; color: #1e40af; }
        .badge-cliente { background: #fdf2f8; color: #9d174d; }

        @media print { .btn-menu-float, .filter-section, .sidebar, .overlay { display: none !important; } body { background: white; color: black; } .tabla-container { box-shadow: none; } }
    </style>
</head>
<body>

    <button class="btn-menu-float" onclick="toggleMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <nav class="sidebar" id="sidebar">
        <div style="padding: 40px 25px 20px;"></div>
        <div style="flex: 1;">
            <a href="dashboard.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path></svg>INICIO</a>
            <a href="carga.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path></svg>REGISTRO DE CARGA</a>
            <a href="camiones.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>CONTROL CAMIONES</a>
            <a href="guias.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path></svg>HISTORIAL GUÍAS</a>
            <a href="reportes.html" class="nav-link active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>REPORTE MENSUAL</a>
        </div>
        <a href="index.html" class="nav-link btn-logout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1-2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            CERRAR SESIÓN
        </a>
    </nav>
    <div class="overlay" onclick="toggleMenu()"></div>

    <header class="header-container">
        <h1>Reporte de Logística</h1>
        <p>Trans Huayna Kapac SRL</p>
    </header>

    <section class="filter-section">
        <div class="search-container">
            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="searchInput" class="search-input" placeholder="Filtrar por Camión, Cliente o Destino...">
        </div>
        <button class="btn-print-report" onclick="window.print()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
            IMPRIMIR REPORTE
        </button>
    </section>

    <div class="stats-grid">
        <div class="stat-card money"><h3>Ingresos Filtrados</h3><p id="totalIngresos">0.00</p></div>
        <div class="stat-card"><h3>Viajes</h3><p id="totalCargas">0</p></div>
        <div class="stat-card"><h3>Cant. Total</h3><p id="totalVolumen">0</p></div>
    </div>

    <div class="tabla-container">
        <table>
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Guía</th>
                    <th>Unidad</th>
                    <th>Consignatario (Cliente)</th>
                    <th>Destino</th>
                    <th>Producto</th>
                    <th>Cant.</th>
                    <th>Monto (Bs)</th>
                </tr>
            </thead>
            <tbody id="tbodyReporte"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyCjXNx1UB2I7mt_JUpBr4E05hJuFJWL6k4", 
            authDomain: "trans-huayna-kapac.firebaseapp.com", 
            projectId: "trans-huayna-kapac", 
            databaseURL: "https://trans-huayna-kapac-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let todosLosRegistros = [];

        onValue(ref(db, 'registros_carga'), (snapshot) => {
            if (snapshot.exists()) {
                todosLosRegistros = Object.values(snapshot.val()).reverse();
                renderizarTabla(todosLosRegistros);
            }
        });

        function renderizarTabla(data) {
            const tbody = document.getElementById("tbodyReporte");
            let sumBs = 0, sumViajes = 0, sumCant = 0;
            tbody.innerHTML = "";

            data.forEach(g => {
                sumBs += parseFloat(g.total || 0);
                sumViajes++;
                sumCant += parseFloat(g.cantidad || 0);

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${g.fecha}</td>
                    <td style="color:var(--azul);">#${g.n_guia}</td>
                    <td><span class="badge badge-camion">${g.camion || 'ALMACÉN'}</span></td>
                    <td><span class="badge badge-cliente">${g.consignatario || '---'}</span></td>
                    <td>${g.destino || 'CENTRO'}</td>
                    <td>${g.producto}</td>
                    <td>${g.cantidad}</td>
                    <td style="font-weight:800;">Bs. ${parseFloat(g.total).toFixed(2)}</td>
                `;
                tbody.appendChild(row);
            });

            document.getElementById("totalIngresos").textContent = sumBs.toLocaleString('es-BO', {minimumFractionDigits: 2});
            document.getElementById("totalCargas").textContent = sumViajes;
            document.getElementById("totalVolumen").textContent = sumCant;
        }

        // LÓGICA DE FILTRO EN TIEMPO REAL
        document.getElementById("searchInput").addEventListener("input", (e) => {
            const term = e.target.value.toLowerCase();
            const filtrados = todosLosRegistros.filter(g => 
                (g.camion && g.camion.toLowerCase().includes(term)) ||
                (g.consignatario && g.consignatario.toLowerCase().includes(term)) ||
                (g.destino && g.destino.toLowerCase().includes(term)) ||
                (g.producto && g.producto.toLowerCase().includes(term))
            );
            renderizarTabla(filtrados);
        });

        window.toggleMenu = function() { document.getElementById('sidebar').classList.toggle('active'); };
    </script>
</body>
</html>
