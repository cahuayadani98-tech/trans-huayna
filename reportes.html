<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte y Control - TRANS CK</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; padding: 15px; color: #2a3b4e; margin: 0; }
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .filter-card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        .full-row { grid-column: span 2; }
        label { font-size: 10px; font-weight: 800; color: #7f8c8d; text-transform: uppercase; margin-bottom: 4px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 14px; }

        .summary-box { background: #2a3b4e; color: white; padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; }
        .total-amount { font-size: 32px; font-weight: 800; color: #2ecc71; }

        .table-container { background: white; border-radius: 20px; overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        th { background: #f8f9fa; padding: 15px; text-align: left; font-size: 11px; text-transform: uppercase; color: #7f8c8d; border-bottom: 2px solid #eee; }
        td { padding: 15px; border-bottom: 1px solid #eee; font-size: 13px; }

        .btn { padding: 12px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-delete { background: #ffeded; color: #e74c3c; padding: 8px 12px; font-size: 11px; border: 1px solid #f5b7b1; border-radius: 8px; }
        .btn-delete:hover { background: #e74c3c; color: white; }
        .btn-excel { background: #27ae60; color: white; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn" onclick="location.href='menu.html'" style="background:none; color:#2a3b4e; font-weight: 800;">← VOLVER AL MENÚ</button>
    </div>

    <div class="filter-card">
        <h3 style="margin-top:0;">Búsqueda y Filtros</h3>
        <div class="filter-grid">
            <div class="full-row">
                <label>Buscar por Remitente</label>
                <input type="text" id="busqRemitente" placeholder="Escribe el nombre..." oninput="filtrar()">
            </div>
            <div>
                <label>Guía Desde:</label>
                <input type="number" id="gDesde" oninput="filtrar()">
            </div>
            <div>
                <label>Guía Hasta:</label>
                <input type="number" id="gHasta" oninput="filtrar()">
            </div>
        </div>
    </div>

    <div class="summary-box">
        <p style="margin:0; font-size:11px; font-weight: 600;">MONTO TOTAL FILTRADO</p>
        <div class="total-amount" id="montoFiltrado">Bs. 0.00</div>
    </div>

    <button class="btn btn-excel" id="descargarExcel">📥 DESCARGAR EXCEL</button>

    <div class="table-container" style="margin-top: 20px;">
        <table id="tablaReporte">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Guía</th>
                    <th>Factura</th>
                    <th>Remitente</th>
                    <th>Destino</th>
                    <th>Monto (Bs.)</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtiw8MM-kchif6lCBJkjh9fVfWAAPxqaE",
            authDomain: "registro-8f26e.firebaseapp.com",
            projectId: "registro-8f26e",
            appId: "1:62551766112:web:e59e4b444591a0e7737f05"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        let datosCompletos = [];

        onSnapshot(query(collection(db, "servicios"), orderBy("fecha", "desc")), (snap) => {
            datosCompletos = [];
            snap.forEach(d => datosCompletos.push({ id: d.id, ...d.data() }));
            filtrar(); 
        });

        // FUNCIÓN PARA ELIMINAR REGISTRO
        window.borrarRegistro = async (id, nroGuia) => {
            const confirmacion = confirm(`¿ESTÁS SEGURO DE ELIMINAR?\nSe borrará la Guía ${nroGuia} del reporte y facturación.`);
            if (confirmacion) {
                try {
                    await deleteDoc(doc(db, "servicios", id));
                    alert("Registro eliminado correctamente.");
                } catch (error) {
                    alert("Error al intentar eliminar.");
                }
            }
        };

        window.filtrar = () => {
            const busqueda = document.getElementById('busqRemitente').value.toLowerCase();
            const desde = parseInt(document.getElementById('gDesde').value) || 0;
            const hasta = parseInt(document.getElementById('gHasta').value) || 999999;
            const tabla = document.getElementById('cuerpoTabla');
            let acumulado = 0;
            tabla.innerHTML = "";

            datosCompletos.forEach(d => {
                const nGuia = parseInt(d.nroGuia) || 0;
                const remitente = (d.remitente || "").toLowerCase();
                if (remitente.includes(busqueda) && nGuia >= desde && nGuia <= hasta) {
                    acumulado += (d.total || 0);
                    tabla.innerHTML += `
                        <tr>
                            <td>${new Date(d.fecha).toLocaleDateString()}</td>
                            <td><b>${d.nroGuia}</b></td>
                            <td>${d.nroFactura}</td>
                            <td>${d.remitente || '-'}</td>
                            <td>${d.destino || '-'}</td>
                            <td style="font-weight:bold; color:#27ae60;">Bs. ${(d.total || 0).toFixed(2)}</td>
                            <td>
                                <button class="btn-delete" onclick="borrarRegistro('${d.id}', '${d.nroGuia}')">BORRAR</button>
                            </td>
                        </tr>`;
                }
            });
            document.getElementById('montoFiltrado').innerText = `Bs. ${acumulado.toFixed(2)}`;
        };

        document.getElementById('descargarExcel').onclick = () => {
            const wb = XLSX.utils.table_to_book(document.getElementById("tablaReporte"));
            XLSX.writeFile(wb, `Reporte_TRANS_CK.xlsx`);
        };
    </script>
</body>
</html>
