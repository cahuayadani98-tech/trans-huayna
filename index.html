<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TRANS HUAYNA KAPAC</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #374151; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 50px; border-radius: 24px; width: 100%; max-width: 300px; text-align: center; }
        .logo-box { background: #facc15; width: 60px; height: 60px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        h1 { font-size: 16px; font-weight: 800; color: #1f2937; margin-bottom: 25px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #e5e7eb; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #1f2937; color: #facc15; font-weight: 800; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-box"><i data-lucide="truck"></i></div>
        <h1>TRANS HUAYNA KAPAC</h1>
        <input type="text" placeholder="Usuario">
        <input type="password" placeholder="Contraseña">
        <button onclick="location.href='menu.html'">ENTRAR AL SISTEMA</button>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
