<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Camiones - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gris-mate: #374151; 
            --amarillo: #facc15; 
            --blanco: #ffffff; 
            --fondo-app: #111827; 
            --azul-corporativo: #1e40af;
            --rojo-error: #ef4444;
            --verde: #22c55e; 
        }
        
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { margin: 0; background: var(--fondo-app); font-family: 'Plus Jakarta Sans', sans-serif; color: white; padding: 15px; }

        /* --- BOTÓN MENÚ --- */
        .btn-menu-float {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            background: var(--blanco); border: none; width: 50px; height: 50px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; color: var(--gris-mate);
            cursor: pointer; transition: 0.1s;
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: #ffffff; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1100; display: flex; flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .sidebar.active { left: 0; }
        .nav-link { display: flex; align-items: center; text-decoration: none; color: #4b5563; padding: 18px 25px; font-weight: 700; font-size: 14px; transition: 0.3s; }
        .nav-link svg { margin-right: 15px; } 
        .nav-link.active { background: #f9fafb; color: #1f2937; }
        .btn-logout { margin-top: auto; border-top: 1px solid #f3f4f6; color: var(--rojo-error) !important; padding: 25px !important; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1050; }
        .sidebar.active + .overlay { display: block; }

        /* --- TÍTULO ACTUALIZADO --- */
        .header-container {
            margin: 80px auto 30px;
            max-width: 500px; text-align: left; padding: 0 10px; border-left: 5px solid var(--amarillo);
        }
        .header-container h1 { margin: 0; font-size: 28px; font-weight: 800; background: linear-gradient(to right, #ffffff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-container p { margin: 5px 0 0; color: var(--amarillo); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 4px; }

        /* --- CARD REGISTRO --- */
        .card { 
            background: var(--blanco); width: 100%; max-width: 500px; 
            border-radius: 25px; padding: 25px; color: black; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); margin: 0 auto 30px; 
        }
        
        h2 { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-weight: 800; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #4b5563; margin-bottom: 5px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e5e7eb; background: #f9fafb; font-family: inherit; font-size: 14px; outline: none; color: var(--gris-mate); font-weight: 600; }

        .btn-elegant { 
            width: 100%; padding: 16px; border-radius: 12px; border: none; 
            font-weight: 800; background: var(--amarillo); color: #1f2937; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            gap: 10px; transition: 0.1s;
        }
        .btn-elegant:active { transform: scale(0.96); }
        
        /* --- LISTA DE CAMIONES --- */
        .section-title { width: 100%; max-width: 500px; margin: 0 auto 15px; font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        
        .list-wrapper { width: 100%; max-width: 500px; margin: 0 auto; }

        .camion-item { 
            display: flex; align-items: center; gap: 12px; padding: 15px; 
            background: rgba(255,255,255,0.05); border-radius: 18px; margin-bottom: 12px; 
            border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
        }
        .camion-icon-box { background: var(--amarillo); padding: 10px; border-radius: 12px; color: var(--gris-mate); display: flex; align-items: center; }
        .camion-info { flex: 1; }
        .placa { font-weight: 800; font-size: 16px; color: var(--blanco); display: block; }
        .chofer { font-size: 11px; color: #9ca3af; font-weight: 600; text-transform: uppercase; }

        .status-svg { width: 20px; height: 20px; stroke-width: 2.5; }
        .color-disponible { color: var(--verde); }
        .color-ruta { color: var(--amarillo); }
        .color-taller { color: var(--rojo-error); }

        .btn-delete { 
            background: #fee2e2; color: var(--rojo-error); border: none; 
            padding: 10px; border-radius: 10px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; transition: 0.2s;
        }
        .btn-delete:hover { background: var(--rojo-error); color: white; }
    </style>
</head>
<body>

    <button class="btn-menu-float" onclick="toggleMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <nav class="sidebar" id="sidebar">
        <div style="padding: 40px 25px 20px;"></div>
        <div style="flex: 1;">
            <a href="dashboard.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>INICIO</a>
            <a href="carga.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path></svg>REGISTRO DE CARGA</a>
            <a href="camiones.html" class="nav-link active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>CONTROL CAMIONES</a>
            <a href="guias.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path></svg>HISTORIAL GUÍAS</a>
            <a href="reportes.html" class="nav-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>REPORTE MENSUAL</a>
        </div>
        <a href="index.html" class="nav-link btn-logout">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            CERRAR SESIÓN
        </a>
    </nav>
    <div class="overlay" onclick="toggleMenu()"></div>

    <header class="header-container">
        <h1>Flota de Camiones</h1>
        <p>Logística y Transporte</p>
    </header>

    <div class="card">
        <h2>REGISTRAR NUEVA UNIDAD</h2>
        <div class="input-group"><label>PLACA</label><input type="text" id="placa" placeholder="0000-XXX"></div>
        <div class="input-group"><label>CHOFER</label><input type="text" id="chofer" placeholder="NOMBRE COMPLETO"></div>
        <div class="input-group">
            <label>ESTADO INICIAL</label>
            <select id="estado">
                <option value="disponible">Disponible</option>
                <option value="ruta">En Ruta</option>
                <option value="mantenimiento">Taller</option>
            </select>
        </div>
        <button class="btn-elegant" id="btnGuardar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            AGREGAR UNIDAD
        </button>
    </div>

    <div class="section-title">📦 UNIDADES EN FLOTA</div>
    <div id="lista-camiones" class="list-wrapper"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjXNx1UB2I7mt_JUpBr4E05hJuFJWL6k4",
            authDomain: "trans-huayna-kapac.firebaseapp.com",
            projectId: "trans-huayna-kapac",
            databaseURL: "https://trans-huayna-kapac-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const ICON_CHECK = `<svg class="status-svg color-disponible" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
        const ICON_CLOCK = `<svg class="status-svg color-ruta" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
        const ICON_TOOL = `<svg class="status-svg color-taller" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1-2.79-2.79l-3.77 3.77Z"></path><path d="M20 13c0 5-4 9-9 9s-9-4-9-9 4-9 9-9c1.88 0 3.63.58 5.08 1.58"></path><path d="m7 15 5-5"></path><path d="m15 15-5-5"></path><path d="m7 10 5 5"></path></svg>`;

        window.toggleMenu = function() { document.getElementById('sidebar').classList.toggle('active'); }

        document.getElementById('btnGuardar').onclick = function() {
            const placa = document.getElementById('placa').value.toUpperCase();
            const chofer = document.getElementById('chofer').value.toUpperCase();
            const estado = document.getElementById('estado').value;
            
            if(!placa || !chofer) return alert("Por favor, complete los campos.");

            const nuevaUnidad = push(ref(db, 'registros_camiones'));
            set(nuevaUnidad, { placa, chofer, estado }).then(() => {
                document.getElementById('placa').value = "";
                document.getElementById('chofer').value = "";
            });
        }

        onValue(ref(db, 'registros_camiones'), (snapshot) => {
            const lista = document.getElementById('lista-camiones');
            lista.innerHTML = "";
            if (snapshot.exists()) {
                Object.entries(snapshot.val()).forEach(([id, c]) => {
                    let sIcon = c.estado === 'disponible' ? ICON_CHECK : (c.estado === 'ruta' ? ICON_CLOCK : ICON_TOOL);
                    const div = document.createElement('div');
                    div.className = 'camion-item';
                    div.innerHTML = `
                        <div class="camion-icon-box">
                            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
                        </div>
                        <div class="camion-info">
                            <span class="placa">${c.placa}</span>
                            <span class="chofer">${c.chofer}</span>
                        </div>
                        <div style="margin-right: 10px;">${sIcon}</div>
                        <button class="btn-delete" onclick="eliminar('${id}')">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    `;
                    lista.appendChild(div);
                });
            }
        });

        window.eliminar = function(id) {
            if(confirm("¿Seguro que deseas eliminar esta unidad?")) {
                remove(ref(db, `registros_camiones/${id}`));
            }
        }
    </script>
</body>
</html>
