<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camiones - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gris-mate: #374151; --amarillo: #facc15; --blanco: #ffffff; --fondo-app: #1f2937; --rojo: #ef4444; --verde: #22c55e; }
        
        body { margin: 0; background: var(--fondo-app); font-family: 'Plus Jakarta Sans', sans-serif; color: white; }

        /* BOTÓN MENÚ FLOTANTE */
        .btn-menu-float {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--blanco); border: none; width: 50px; height: 50px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; color: var(--gris-mate);
            cursor: pointer;
        }

        /* SIDEBAR CON TEXTO INICIO */
        .sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: var(--blanco); transition: 0.4s; z-index: 1100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .nav-link { display: flex; align-items: center; text-decoration: none; color: #4b5563; padding: 18px 25px; font-weight: 700; font-size: 13px; border-bottom: 1px solid #f9fafb; }

        .main-container { 
            width: 100%; padding: 100px 20px 40px 20px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: center;
        }
        
        .header-section { width: 100%; max-width: 500px; margin-bottom: 25px; }
        .header-section h1 { margin:0; font-size: 24px; font-weight: 800; }
        .header-section p { margin:0; font-size: 10px; color: var(--amarillo); letter-spacing: 1px; text-transform: uppercase; }

        /* TARJETAS */
        .card { 
            background: var(--blanco); width: 100%; max-width: 500px; 
            border-radius: 30px; padding: 30px; color: black; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); box-sizing: border-box; margin-bottom: 25px; 
        }
        
        h2 { font-size: 11px; color: #9ca3af; text-transform: uppercase; letter-spacing: 2px; margin: 0 0 20px 0; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 10px; font-weight: 800; color: #4b5563; margin-bottom: 5px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e5e7eb; background: #f9fafb; box-sizing: border-box; font-family: inherit; font-size: 14px; outline: none; }

        .btn-elegant { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: 800; background: var(--amarillo); color: #1f2937; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        
        /* LISTA DE UNIDADES */
        .camion-item { display: flex; align-items: center; gap: 12px; padding: 15px; background: rgba(255,255,255,0.08); border-radius: 15px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 500px; box-sizing: border-box; }
        .camion-icon-box { background: var(--amarillo); padding: 10px; border-radius: 12px; min-width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; color: var(--gris-mate); }
        .camion-info { flex: 1; }
        .placa { font-weight: 800; font-size: 15px; color: var(--amarillo); display: block; }
        .chofer { font-size: 11px; color: #9ca3af; }

        .status-svg { width: 18px; height: 18px; stroke-width: 2.5; }
        .color-disponible { color: var(--verde); }
        .color-ruta { color: var(--amarillo); }
        .color-taller { color: var(--rojo); }

        .btn-delete { background: rgba(255, 255, 255, 0.1); color: #9ca3af; border: none; padding: 10px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1050; }
        .sidebar.open + .overlay { display: block; }
    </style>
</head>
<body>

    <button class="btn-menu-float" onclick="toggleMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <nav class="sidebar" id="sidebar">
        <div style="padding: 30px 25px; font-weight: 800; border-bottom: 1px solid #f3f4f6; color: var(--gris-mate);">MENÚ SISTEMA</div>
        <div style="flex: 1;">
            <a href="index.html" class="nav-link">INICIO</a>
            <a href="carga.html" class="nav-link">REGISTRO DE CARGA</a>
            <a href="camiones.html" class="nav-link" style="color: var(--amarillo);">CONTROL CAMIONES</a>
            <a href="guias.html" class="nav-link">HISTORIAL GUÍAS</a>
            <a href="reportes.html" class="nav-link">REPORTE MENSUAL</a>
        </div>
        <a href="index.html" class="nav-link" style="color: #ef4444; border-top: 1px solid #f3f4f6;">SALIR</a>
    </nav>
    <div class="overlay" onclick="toggleMenu()"></div>

    <div class="main-container">
        <div class="header-section">
            <h1>Flota de Camiones</h1>
            <p>GESTIÓN PROFESIONAL</p>
        </div>

        <div class="card">
            <h2>REGISTRAR UNIDAD</h2>
            <div class="input-group"><label>PLACA</label><input type="text" id="placa" placeholder="0000-XXX"></div>
            <div class="input-group"><label>CHOFER</label><input type="text" id="chofer" placeholder="Nombre completo"></div>
            <div class="input-group">
                <label>ESTADO INICIAL</label>
                <select id="estado">
                    <option value="disponible">Disponible</option>
                    <option value="ruta">En Ruta</option>
                    <option value="mantenimiento">Taller</option>
                </select>
            </div>
            <button class="btn-elegant" onclick="guardarCamion()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                AGREGAR UNIDAD
            </button>
        </div>

        <h2 style="color: #9ca3af; margin-top: 10px; width: 100%; max-width: 500px;">📦 UNIDADES EN FLOTA</h2>
        <div id="lista-camiones" style="width: 100%; max-width: 500px;"></div>
    </div>

    <script>
        const ICON_CHECK = `<svg class="status-svg color-disponible" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
        const ICON_CLOCK = `<svg class="status-svg color-ruta" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`;
        const ICON_TOOL = `<svg class="status-svg color-taller" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a2 2 0 0 1-2.79-2.79l-3.77 3.77Z"></path><path d="M20 13c0 5-4 9-9 9s-9-4-9-9 4-9 9-9c1.88 0 3.63.58 5.08 1.58"></path><path d="m7 15 5-5"></path><path d="m15 15-5-5"></path><path d="m7 10 5 5"></path></svg>`;

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }

        function guardarCamion() {
            const placa = document.getElementById('placa').value;
            const chofer = document.getElementById('chofer').value;
            const estado = document.getElementById('estado').value;
            if(!placa || !chofer) return alert("Por favor, complete los campos.");

            let flota = JSON.parse(localStorage.getItem('flota')) || [];
            flota.push({ placa, chofer, estado });
            localStorage.setItem('flota', JSON.stringify(flota));
            
            document.getElementById('placa').value = "";
            document.getElementById('chofer').value = "";
            mostrarFlota();
        }

        function mostrarFlota() {
            let flota = JSON.parse(localStorage.getItem('flota')) || [];
            const lista = document.getElementById('lista-camiones');
            lista.innerHTML = flota.map((c, i) => {
                let sIcon = c.estado === 'disponible' ? ICON_CHECK : (c.estado === 'ruta' ? ICON_CLOCK : ICON_TOOL);
                return `
                <div class="camion-item">
                    <div class="camion-icon-box">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 16v3H5v-3"></path><path d="M17 12H7"></path><path d="M21 8l-2-2H5L3 8v8h18V8z"></path></svg>
                    </div>
                    <div class="camion-info">
                        <span class="placa">${c.placa}</span>
                        <span class="chofer">${c.chofer}</span>
                    </div>
                    ${sIcon}
                    <button class="btn-delete" onclick="eliminar(${i})">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    </button>
                </div>
            `;}).join('');
        }

        function eliminar(i) {
            let flota = JSON.parse(localStorage.getItem('flota')) || [];
            flota.splice(i, 1);
            localStorage.setItem('flota', JSON.stringify(flota));
            mostrarFlota();
        }
        mostrarFlota();
    </script>
</body>
</html>
