<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factura - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gris-mate: #374151; --amarillo: #facc15; --blanco: #ffffff; }
        body { margin: 0; padding: 20px; background: #f3f4f6; font-family: 'Plus Jakarta Sans', sans-serif; display: flex; justify-content: center; }
        .factura-papel { width: 100%; max-width: 450px; background: var(--blanco); padding: 40px; border-radius: 0; box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative; border-top: 8px solid var(--amarillo); }
        .header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .logo-text { font-weight: 800; font-size: 20px; color: var(--gris-mate); margin: 0; }
        .nit-info { font-size: 12px; font-weight: 600; color: #6b7280; margin-top: 5px; }
        .datos-cli { margin-bottom: 20px; font-size: 13px; }
        .dato-fila { display: flex; justify-content: space-between; margin-bottom: 8px; border-bottom: 1px dashed #e5e7eb; padding-bottom: 4px; }
        .dato-label { font-weight: 800; color: #374151; }
        .total-area { background: #1f2937; color: var(--amarillo); padding: 20px; border-radius: 12px; text-align: center; margin-top: 30px; }
        .qr-area { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .qr-code { width: 120px; height: 120px; background: #eee; }
        .btn-print { width: 100%; padding: 15px; background: #1f2937; color: white; border: none; border-radius: 10px; font-weight: 800; margin-top: 20px; cursor: pointer; }
        @media print { .btn-print { display: none; } body { background: white; padding: 0; } .factura-papel { box-shadow: none; border: none; } }
    </style>
</head>
<body>
    <div class="factura-papel">
        <div class="header">
            <p class="logo-text">TRANS HUAYNA KAPAC</p>
            <p style="font-size: 10px; margin: 2px;">Logística y Transporte</p>
            <div class="nit-info">NIT: 1028374021 | FACTURA N°: 0042</div>
        </div>

        <div class="datos-cli">
            <div class="dato-fila"><span class="dato-label">FECHA:</span> <span id="f-fecha"></span></div>
            <div class="dato-fila"><span class="dato-label">SEÑOR(ES):</span> <span id="f-cliente"></span></div>
            <div class="input-group" style="margin-top:10px;">
                <label style="font-size: 10px; font-weight: 800;">NIT/CI CLIENTE:</label>
                <input type="number" style="width: 100%; border: none; border-bottom: 1px solid #ccc; font-family: inherit;" placeholder="Ingrese NIT...">
            </div>
        </div>

        <div style="font-size: 13px; margin-top: 20px;">
            <div class="dato-fila"><span class="dato-label">DETALLE:</span> <span id="f-prod"></span></div>
        </div>

        <div class="total-area">
            <p style="margin:0; font-size: 10px; letter-spacing: 2px;">TOTAL A PAGAR</p>
            <h2 style="margin:0; font-size: 30px;">Bs. <span id="f-total">0.00</span></h2>
        </div>

        <div class="qr-area">
            <img id="qr-img" class="qr-code" src="" alt="QR Factura">
            <p style="font-size: 9px; color: #9ca3af; text-align: center;">Escanee para validar la<br>guía electrónica del cliente</p>
        </div>

        <button class="btn-print" onclick="window.print()">EMITIR FACTURA</button>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const total = params.get('total') || "0.00";
        const cliente = params.get('cliente') || "S/N";
        const producto = params.get('prod') || "Servicio de Transporte";
        const fecha = new Date().toLocaleDateString();

        document.getElementById('f-total').innerText = total;
        document.getElementById('f-cliente').innerText = cliente;
        document.getElementById('f-prod').innerText = producto;
        document.getElementById('f-fecha').innerText = fecha;

        // GENERAR QR DINÁMICO (Apunta a una URL de ejemplo con los datos)
        const qrData = `Guia:00154|Cliente:${cliente}|Total:${total}`;
        document.getElementById('qr-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrData)}`;
    </script>
</body>
</html>
