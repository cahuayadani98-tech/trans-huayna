<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas - TRANS CK</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0e2a; color: white; padding: 20px; }
        .factura-box { background: white; color: #333; padding: 20px; border-radius: 10px; max-width: 600px; margin: auto; }
        .header-fact { border-bottom: 2px solid #4dabf7; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .logo-ck { color: #152042; font-weight: bold; font-size: 24px; }
        .total-box { background: #f8f9fa; padding: 15px; text-align: right; margin-top: 20px; border-radius: 8px; }
        .btn-print { display: block; width: 100%; padding: 15px; background: #4dabf7; color: white; border: none; border-radius: 10px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <a href="menu.html" style="color: #4dabf7; text-decoration: none;">← Volver</a>
    <h2 style="text-align: center; color: #4dabf7;">Visor de Facturas</h2>

    <div class="factura-box">
        <div class="header-fact">
            <div class="logo-ck">TRANS CK</div>
            <div><strong>N° 0001</strong></div>
        </div>
        <p><strong>Cliente:</strong> Distribuidora Norte</p>
        <p><strong>Fecha:</strong> 19/03/2026</p>
        <hr>
        <table style="width: 100%; text-align: left;">
            <tr><th>Carga</th><th>Cant.</th><th>Subtotal</th></tr>
            <tr><td>Cemento Wari</td><td>100</td><td>5000 Bs.</td></tr>
        </table>
        <div class="total-box">
            <span style="font-size: 20px;">Total: <strong>5000 Bs.</strong></span>
        </div>
    </div>
    <button class="btn-print">COMPARTIR / IMPRIMIR</button>
</body>
</html>
