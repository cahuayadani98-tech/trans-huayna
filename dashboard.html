<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - THK</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --fondo: #0f172a;
            --tarjeta: #1e293b;
            --amarillo: #facc15;
            --amarillo-brillo: rgba(250, 204, 21, 0.4);
            --verde-neon: #4ade80;
            --azul-claro: #38bdf8;
            --blanco: #ffffff;
        }

        body {
            background-color: var(--fondo);
            color: var(--blanco);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* --- CABECERA INSTITUCIONAL --- */
        .header-brand {
            text-align: center;
            padding: 30px 0 10px;
            margin-bottom: 30px;
        }

        .brand-name {
            font-weight: 800;
            font-size: 24px;
            color: var(--amarillo);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 15px var(--amarillo-brillo);
        }

        .brand-subtitle {
            font-size: 12px;
            color: var(--blanco);
            opacity: 0.7;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-top: 5px;
            font-weight: 600;
        }

        .panel-label {
            display: inline-block;
            margin-top: 15px;
            padding: 4px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            font-size: 10px;
            letter-spacing: 1px;
            opacity: 0.5;
        }

        /* --- CUADRÍCULA DE BOTONES --- */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .menu-item {
            background: var(--tarjeta);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 22px 10px;
            text-align: center;
            text-decoration: none;
            color: var(--blanco);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s ease;
        }

        /* Efecto visual al presionar */
        .menu-item:active { 
            transform: scale(0.96); 
            background: #26334d; 
        }

        .icon-svg {
            width: 32px;
            height: 32px;
            margin-bottom: 14px;
            stroke: currentColor;
            stroke-width: 1.5;
            fill: none;
        }

        /* --- ESTILOS DE COLORES POR BOTÓN --- */
        .btn-carga .icon-svg { color: var(--azul-claro); }
        .btn-camiones .icon-svg { color: var(--amarillo); }
        .btn-guias .icon-svg { color: #a855f7; }
        .btn-reportes .icon-svg { color: #f87171; }

        /* BOTÓN BALANCE (RESALTADO) */
        .btn-balance { 
            grid-column: span 2; 
            border: 1.5px solid var(--verde-neon);
            background: linear-gradient(145deg, #1e293b, #131c2e);
            box-shadow: 0 4px 20px rgba(74, 222, 128, 0.1);
        }
        .btn-balance .icon-svg { color: var(--verde-neon); width: 36px; height: 36px; }

        .menu-item span { 
            font-weight: 700; 
            font-size: 13px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .footer {
            text-align: center;
            padding: 40px 0 20px;
            font-size: 10px;
            opacity: 0.3;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="header-brand">
        <h1 class="brand-name">Trans Huayna Kapac</h1>
        <div class="brand-subtitle">Logística y Transporte</div>
        <div class="panel-label">PANEL DE CONTROL</div>
    </div>

    <div class="menu-grid">
        
        <a href="carga.html" class="menu-item btn-carga">
            <svg class="icon-svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
            <span>Registro de Carga</span>
        </a>

        <a href="camiones.html" class="menu-item btn-camiones">
            <svg class="icon-svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1" y="3" width="15" height="13"></rect>
                <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                <circle cx="5.5" cy="18.5" r="2.5"></circle>
                <circle cx="18.5" cy="18.5" r="2.5"></circle>
            </svg>
            <span>Control Camiones</span>
        </a>

        <a href="guias.html" class="menu-item btn-guias">
            <svg class="icon-svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
            </svg>
            <span>Historial Guías</span>
        </a>

        <a href="reportes.html" class="menu-item btn-reportes">
            <svg class="icon-svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="20" x2="18" y2="10"></line>
                <line x1="12" y1="20" x2="12" y2="4"></line>
                <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
            <span>Reportes Generales</span>
        </a>

        <a href="balance.html" class="menu-item btn-balance">
            <svg class="icon-svg" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="1" x2="12" y2="23"></line>
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
            </svg>
            <span>Control de Gastos y Balances</span>
        </a>

    </div>

    <div class="footer">
        THK S.R.L. | BOLIVIA · 2026
    </div>

</body>
</html>
