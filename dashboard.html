<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro - TRANS CK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-gris: #537d8f;
            --celeste: #8ac9d8;
            --blanco: #ffffff;
            --texto-oscuro: #2a3b4e;
            --madera-suave: #d9b897; /* Toque de madera del dormitorio */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--azul-gris);
            margin: 0;
            padding: 15px;
            color: var(--texto-oscuro);
        }

        .card {
            background: var(--blanco);
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 20px auto;
            border: 2px solid rgba(83, 125, 143, 0.1); /* Borde sutil azul-gris */
        }

        h2 { color: var(--texto-oscuro); text-align: center; margin-bottom: 25px; font-size: 26px; font-weight: 800; }
        label { display: block; margin-top: 15px; font-weight: 600; color: var(--azul-gris); font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 2px solid #ddd;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: #fafafa;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--celeste);
            box-shadow: 0 0 10px rgba(138, 201, 216, 0.4);
        }
        
        /* Ajuste de filas */
        .fila-flex { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 5px; }
        .fila-flex input { flex: 1 1 calc(50% - 10px); min-width: 120px; }

        .seccion-productos { background: #f9f9f9; padding: 15px; border-radius: 15px; margin-top: 10px; border: 2px dashed #ddd; }
        .fila-producto { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .in-carga { flex: 2 1 100%; }
        .in-cant, .in-precio { flex: 1 1 70px; }
        .btn-del { flex: 0 0 40px; height: 40px; background: var(--madera-suave); color: #7f603f; border: none; border-radius: 10px; font-weight: 600; }

        .btn-main { width: 100%; background: var(--celeste); color: var(--texto-oscuro); padding: 18px; border: none; border-radius: 15px; margin-top: 25px; font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 5px 15px rgba(138, 201, 216, 0.4); }
        .btn-main:active { transform: scale(0.97); }
        .btn-volver { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 15px; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <a href="menu.html" class="btn-volver">← Volver al Menú</a>
    <h2>Nuevo Registro</h2>
    
    <label>Logística</label>
    <select><option>Seleccionar Camión</option></select>
    <input type="text" placeholder="Remitente">
    <input type="text" placeholder="Consignatario">
    
    <div class="fila-flex">
        <input type="text" placeholder="Origen">
        <input type="text" placeholder="Destino">
    </div>

    <label>Flete y Productos</label>
    <div class="seccion-productos">
        <div class="fila-producto">
            <input type="text" class="in-carga" placeholder="Carga/Producto">
            <input type="number" class="in-cant" placeholder="Cant.">
            <input type="number" class="in-precio" placeholder="Bs/U.">
            <button class="btn-del" type="button">×</button>
        </div>
    </div>

    <label>Gastos</label>
    <div class="fila-flex">
        <input type="number" placeholder="Diésel (Bs)">
        <input type="number" placeholder="Peajes (Bs)">
        <input type="number" placeholder="Otros">
    </div>

    <button type="button" class="btn-main">REGISTRAR VIAJE</button>
</div>

</body>
</html>
