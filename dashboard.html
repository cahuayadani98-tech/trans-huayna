<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registro TRANS CK</title>
    <style>
        :root {
            --azul-oscuro: #1a237e;
            --gris-claro: #f4f7fe;
            --rojo: #ff5252;
        }

        body {
            font-family: sans-serif;
            background-color: var(--gris-claro);
            margin: 0;
            padding: 15px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }

        h2 { color: var(--azul-oscuro); margin-bottom: 20px; }
        label { font-weight: bold; color: var(--azul-oscuro); display: block; margin-top: 15px; font-size: 14px; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box; /* Evita que se salga de la pantalla */
            font-size: 16px; /* Evita el zoom automático en iPhone */
        }

        /* FILAS FLEXIBLES (LO QUE SE DESCUADRABA) */
        .fila-flex {
            display: flex;
            flex-wrap: wrap; /* Si no cabe, baja el siguiente cuadro */
            gap: 10px;
            margin-top: 5px;
        }

        .fila-flex input {
            flex: 1 1 calc(50% - 10px); /* Ocupa la mitad menos el espacio (gap) */
        }

        /* SECCIÓN DE PRODUCTOS */
        .fila-productos {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            background: #f9f9f9;
            padding: 10px;
            border-radius: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .input-carga { flex: 2 1 100%; } /* La carga ocupa toda la fila arriba */
        .input-cant { flex: 1 1 70px; }
        .input-bs { flex: 1 1 70px; }
        .btn-borrar { 
            flex: 0 0 40px; 
            height: 40px; 
            background: var(--rojo); 
            color: white; 
            border: none; 
            border-radius: 8px;
            font-weight: bold;
        }

        .btn-registrar {
            width: 100%;
            background: var(--azul-oscuro);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 15px;
            margin-top: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Registro #001</h2>
    
    <label>LOGÍSTICA</label>
    <select><option>Seleccionar Camión</option></select>
    <input type="text" placeholder="Remitente">
    <input type="text" placeholder="Consignatario">
    
    <div class="fila-flex">
        <input type="text" placeholder="Origen">
        <input type="text" placeholder="Destino">
    </div>

    <label>FLETE (PRODUCTOS)</label>
    <div class="fila-productos">
        <input type="text" class="input-carga" placeholder="Carga">
        <input type="number" class="input-cant" placeholder="Cant.">
        <input type="number" class="input-bs" placeholder="Bs/U.">
        <button class="btn-borrar">X</button>
    </div>

    <label>GASTOS DEL VIAJE</label>
    <div class="fila-flex">
        <input type="number" placeholder="Gasto 1">
        <input type="number" placeholder="Gasto 2">
        <input type="number" placeholder="Gasto 3">
    </div>

    <button class="btn-registrar">REGISTRAR VIAJE</button>
</div>

</body>
</html>
