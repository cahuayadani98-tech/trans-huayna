<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Carga - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gris-mate: #374151; --amarillo: #facc15; --fondo: #1f2937; }
        body { margin: 0; background: var(--fondo); font-family: 'Plus Jakarta Sans', sans-serif; color: white; padding: 20px; }
        
        .container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 30px; color: var(--gris-mate); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        h1 { font-size: 22px; font-weight: 800; text-align: center; margin-bottom: 25px; color: var(--fondo); }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; color: #6b7280; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f3f4f6; box-sizing: border-box; font-family: inherit; font-weight: 600; outline: none; }
        
        /* Estilo para el campo automático (deshabilitado) */
        input:disabled { background: #f9fafb; color: #1f2937; border-color: #e5e7eb; cursor: not-allowed; }
        input:focus { border-color: var(--amarillo); }

        .btn-registrar { width: 100%; padding: 18px; background: var(--fondo); color: var(--amarillo); border: none; border-radius: 15px; font-weight: 800; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-registrar:active { transform: scale(0.98); }
        
        .btn-back { display: block; text-align: center; margin-top: 20px; text-decoration: none; color: #6b7280; font-size: 13px; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Nueva Carga</h1>
        
        <div class="form-group">
            <label>N° de Guía (Automático)</label>
            <input type="text" id="n_guia" disabled placeholder="Cargando...">
        </div>

        <div class="form-group">
            <label>Remitente</label>
            <input type="text" id="remitente" placeholder="Nombre de quien envía">
        </div>

        <div class="form-group">
            <label>Consignatario</label>
            <input type="text" id="consignatario" placeholder="Nombre de quien recibe">
        </div>

        <div class="form-group">
            <label>Producto / Descripción</label>
            <input type="text" id="producto" placeholder="Ej: Sacos de Harina">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group">
                <label>Peso / Cantidad</label>
                <input type="text" id="peso" placeholder="Ej: 50 kg">
            </div>
            <div class="form-group">
                <label>Total (Bs.)</label>
                <input type="number" id="total" placeholder="0.00">
            </div>
        </div>

        <div class="form-group">
            <label>Estado de Carga</label>
            <select id="estado">
                <option value="COMPLETADO">COMPLETADO</option>
                <option value="EN CAMINO">EN CAMINO</option>
                <option value="PENDIENTE">PENDIENTE</option>
            </select>
        </div>

        <button class="btn-registrar" id="btnGuardar">REGISTRAR EN EL SISTEMA</button>
        <a href="dashboard.html" class="btn-back">VOLVER AL INICIO</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjXNx1UB2I7mt_JUpBr4E05hJuFJWL6k4",
            authDomain: "trans-huayna-kapac.firebaseapp.com",
            projectId: "trans-huayna-kapac",
            storageBucket: "trans-huayna-kapac.firebasestorage.app",
            messagingSenderId: "683920138332",
            appId: "1:683920138332:web:b028d2dae6d92aca5dc699",
            databaseURL: "https://trans-huayna-kapac-default-rtdb.firebaseio.com/"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- LÓGICA DEL NÚMERO DE GUÍA AUTOMÁTICO ---
        const guiaInput = document.getElementById('n_guia');
        const registrosRef = ref(db, 'registros_carga');

        // Escuchar el último registro para generar el siguiente número
        onValue(registrosRef, (snapshot) => {
            const data = snapshot.val();
            let siguienteNumero = 1;

            if (data) {
                // Obtenemos todos los números de guía actuales
                const numeros = Object.values(data).map(item => parseInt(item.n_guia) || 0);
                // Buscamos el más alto y sumamos 1
                siguienteNumero = Math.max(...numeros) + 1;
            }
            
            // Le damos formato de 5 dígitos (ej: 00001)
            guiaInput.value = siguienteNumero.toString().padStart(5, '0');
        });

        // --- GUARDAR REGISTRO ---
        document.getElementById('btnGuardar').onclick = function() {
            const data = {
                n_guia: guiaInput.value, // Toma el automático
                remitente: document.getElementById('remitente').value,
                consignatario: document.getElementById('consignatario').value,
                producto: document.getElementById('producto').value,
                peso: document.getElementById('peso').value,
                total: document.getElementById('total').value,
                estado: document.getElementById('estado').value,
                fecha: new Date().toLocaleDateString()
            };

            if(data.producto && data.total) {
                const nuevoRegistroRef = push(ref(db, 'registros_carga'));
                set(nuevoRegistroRef, data)
                    .then(() => {
                        alert("✅ Guía " + data.n_guia + " registrada con éxito");
                        window.location.href = 'reportes.html';
                    })
                    .catch((e) => alert("Error: " + e.message));
            } else {
                alert("⚠️ Por favor completa el Producto y el Total");
            }
        };
    </script>
</body>
</html>
