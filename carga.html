<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gris-mate: #374151; --amarillo: #facc15; --blanco: #ffffff; --fondo-app: #1f2937; }
        body { margin: 0; background: var(--fondo-app); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* BOTÓN MENÚ */
        .btn-menu-float {
            position: fixed; top: 20px; left: 20px; z-index: 1000;
            background: var(--blanco); border: none; width: 50px; height: 50px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; color: var(--gris-mate);
        }

        /* SIDEBAR CON OPCIÓN INICIO */
        .sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: var(--blanco); transition: 0.4s; z-index: 1100;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5); display: flex; flex-direction: column;
        }
        .sidebar.open { left: 0; }
        .nav-link { display: flex; align-items: center; text-decoration: none; color: #4b5563; padding: 18px 25px; font-weight: 700; font-size: 13px; border-bottom: 1px solid #f9fafb; }

        .main-container { width: 100%; padding: 100px 20px 40px 20px; box-sizing: border-box; display: flex; flex-direction: column; align-items: center; }
        .header-section { width: 100%; max-width: 500px; margin-bottom: 25px; }
        .header-section h2 { color: var(--blanco); font-size: 28px; font-weight: 800; margin: 0; }

        /* TARJETAS */
        .card { background: var(--blanco); width: 100%; max-width: 500px; border-radius: 30px; padding: 30px; margin-bottom: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); box-sizing: border-box; }
        .card-title { display: flex; align-items: center; gap: 10px; color: #9ca3af; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: var(--gris-mate); font-size: 11px; font-weight: 800; margin-bottom: 8px; text-transform: uppercase; }
        .input-field { width: 100%; padding: 15px; border: 2px solid #f3f4f6; border-radius: 15px; background: #f9fafb; font-family: inherit; font-size: 15px; box-sizing: border-box; outline: none; }

        .btn-save { width: 100%; max-width: 500px; background: var(--amarillo); border: none; padding: 20px; border-radius: 20px; color: var(--gris-mate); font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1050; }
        .sidebar.open + .overlay { display: block; }
    </style>
</head>
<body>
    <button class="btn-menu-float" onclick="toggleMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <nav class="sidebar" id="sidebar">
        <div style="padding: 30px 25px; font-weight: 800; border-bottom: 1px solid #eee;">MENÚ SISTEMA</div>
        <div style="flex: 1;">
            <a href="index.html" class="nav-link">INICIO</a>
            <a href="carga.html" class="nav-link" style="color: var(--amarillo);">REGISTRO DE CARGA</a>
            <a href="camiones.html" class="nav-link">CONTROL CAMIONES</a>
            <a href="guias.html" class="nav-link">HISTORIAL GUÍAS</a>
            <a href="reportes.html" class="nav-link">REPORTE MENSUAL</a>
        </div>
        <a href="index.html" class="nav-link" style="color: #ef4444; border-top: 1px solid #eee;">SALIR</a>
    </nav>
    <div class="overlay" onclick="toggleMenu()"></div>

    <div class="main-container">
        <div class="header-section"><h2>Nueva Carga</h2></div>
        <div class="card">
            <div class="card-title">👤 DATOS DEL CLIENTE</div>
            <div class="input-group"><label>Remitente</label><input type="text" id="rem" class="input-field"></div>
            <div class="input-group"><label>Consignatario</label><input type="text" id="cons" class="input-field"></div>
        </div>
        <div class="card">
            <div class="card-title">📦 DETALLE DE CARGA</div>
            <div class="input-group"><label>Producto</label><input type="text" id="prod" class="input-field"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="input-group"><label>Cantidad</label><input type="number" id="cant" class="input-field"></div>
                <div class="input-group"><label>Total Bs.</label><input type="number" id="total" class="input-field"></div>
            </div>
        </div>
        <button class="btn-save" onclick="generarGuia()">GUARDAR Y GENERAR GUÍA</button>
    </div>

    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('open'); }
        function generarGuia() {
            const r = document.getElementById('rem').value;
            const c = document.getElementById('cons').value;
            const p = document.getElementById('prod').value;
            const ca = document.getElementById('cant').value;
            const t = document.getElementById('total').value;
            const n = Math.floor(Math.random() * 90000) + 10000;
            window.location.href = `imprimir.html?num=${n}&rem=${r}&cons=${c}&prod=${p}&cant=${ca}&total=${t}`;
        }
    </script>
</body>
</html>
