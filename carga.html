<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gris-mate: #374151; 
            --amarillo: #facc15; 
            --blanco: #ffffff; 
            --fondo-app: #1f2937; 
        }
        
        body { margin: 0; background: var(--fondo-app); font-family: 'Plus Jakarta Sans', sans-serif; color: white; padding: 15px; }

        /* --- BOTÓN MENÚ CON EFECTO DE PULSACIÓN --- */
        .btn-menu-float {
            position: fixed; top: 20px; left: 20px; z-index: 1001;
            background: var(--blanco); border: none; width: 50px; height: 50px;
            border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center; color: var(--gris-mate);
            cursor: pointer;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            transition: transform 0.1s ease;
        }
        .btn-menu-float:active { transform: scale(0.9); background: #f3f4f6; }

        /* --- SIDEBAR PROFESIONAL --- */
        .sidebar { 
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%; 
            background: #ffffff; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 1100; display: flex; flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }
        .sidebar.active { left: 0; }

        .nav-link { 
            display: flex; align-items: center; text-decoration: none; 
            color: #4b5563; padding: 20px 25px; font-weight: 700; 
            font-size: 14px; letter-spacing: 0.5px; transition: 0.3s;
        }
        .nav-link svg { margin-right: 15px; color: #4b5563; }
        .nav-link:active, .nav-link.active { background: #f9fafb; color: #1f2937; }
        .btn-logout { margin-top: auto; border-top: 1px solid #f3f4f6; color: #ef4444 !important; padding: 25px !important; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 1050; }
        .sidebar.active + .overlay { display: block; }

        /* --- CONTENEDOR DE FORMULARIO --- */
        .container { 
            max-width: 500px; margin: 90px auto 20px; background: white; 
            padding: 25px; border-radius: 30px; color: var(--gris-mate); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); 
        }
        h1 { font-size: 20px; font-weight: 800; text-align: center; margin-bottom: 20px; color: var(--fondo-app); }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; color: #6b7280; letter-spacing: 0.5px; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f3f4f6; box-sizing: border-box; font-family: inherit; font-weight: 600; font-size: 14px; outline: none; color: var(--gris-mate); transition: 0.2s; }
        input:focus { border-color: var(--amarillo); background: #fff; }
        input:disabled { background: #f9fafb; color: #9ca3af; border-color: #eee; }
        
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* BOTÓN REGISTRAR CON EFECTO */
        .btn-registrar { 
            width: 100%; padding: 18px; background: var(--fondo-app); color: var(--amarillo); 
            border: none; border-radius: 15px; font-weight: 800; cursor: pointer; 
            margin-top: 15px; font-size: 14px; transition: 0.1s;
            outline: none; -webkit-tap-highlight-color: transparent;
        }
        .btn-registrar:active { transform: scale(0.96); opacity: 0.9; }
    </style>
</head>
<body>

    <button class="btn-menu-float" onclick="toggleMenu()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <nav class="sidebar" id="sidebar">
        <div style="padding: 40px 25px 20px;"></div>
        <div style="flex: 1;">
            <a href="dashboard.html" class="nav-link">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                INICIO
            </a>
            <a href="carga.html" class="nav-link active">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="m9 14 2 2 4-4"></path></svg>
                REGISTRO DE CARGA
            </a>
            <a href="camiones.html" class="nav-link">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
                CONTROL CAMIONES
            </a>
            <a href="guias.html" class="nav-link">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path></svg>
                HISTORIAL GUÍAS
            </a>
            <a href="reportes.html" class="nav-link">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                REPORTE MENSUAL
            </a>
        </div>
        <a href="index.html" class="nav-link btn-logout">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1-2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            CERRAR SESIÓN
        </a>
    </nav>
    <div class="overlay" onclick="toggleMenu()"></div>

    <div class="container">
        <h1>Registro de Carga</h1>
        
        <div class="form-group">
            <label>N° de Guía</label>
            <input type="text" id="n_guia" disabled placeholder="Generando...">
        </div>
        
        <div class="row">
            <div class="form-group"><label>Remitente</label><input type="text" id="remitente" placeholder="Nombre"></div>
            <div class="form-group"><label>C.I. Remitente</label><input type="text" id="ci_remitente" placeholder="C.I."></div>
        </div>

        <div class="row">
            <div class="form-group"><label>Consignatario</label><input type="text" id="consignatario" placeholder="Nombre"></div>
            <div class="form-group"><label>C.I. Consignatario</label><input type="text" id="ci_consignatario" placeholder="C.I."></div>
        </div>

        <div class="form-group"><label>Producto / Mercadería</label><input type="text" id="producto" placeholder="Ej: Sacos de Harina"></div>

        <div class="row">
            <div class="form-group"><label>Peso / Cantidad</label><input type="text" id="peso" placeholder="Ej: 500kg"></div>
            <div class="form-group"><label>Total (Bs.)</label><input type="number" id="total" placeholder="0.00"></div>
        </div>

        <div class="form-group">
            <label>Estado del Envío</label>
            <select id="estado">
                <option value="PENDIENTE">PENDIENTE</option>
                <option value="EN CAMINO">EN CAMINO</option>
                <option value="COMPLETADO">COMPLETADO</option>
            </select>
        </div>

        <button class="btn-registrar" id="btnGuardar">REGISTRAR E IMPRIMIR</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCjXNx1UB2I7mt_JUpBr4E05hJuFJWL6k4",
            authDomain: "trans-huayna-kapac.firebaseapp.com",
            projectId: "trans-huayna-kapac",
            databaseURL: "https://trans-huayna-kapac-default-rtdb.firebaseio.com/",
            storageBucket: "trans-huayna-kapac.firebasestorage.app",
            messagingSenderId: "683920138332",
            appId: "1:683920138332:web:b028d2dae6d92aca5dc699"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const guiaInput = document.getElementById('n_guia');

        onValue(ref(db, 'registros_carga'), (snapshot) => {
            let num = 1;
            if (snapshot.exists()) {
                const ns = Object.values(snapshot.val()).map(i => parseInt(i.n_guia)).filter(n => !isNaN(n));
                if (ns.length > 0) num = Math.max(...ns) + 1;
            }
            guiaInput.value = num.toString().padStart(5, '0');
        });

        document.getElementById('btnGuardar').onclick = function() {
            const data = {
                n_guia: guiaInput.value,
                remitente: document.getElementById('remitente').value,
                ci_remitente: document.getElementById('ci_remitente').value,
                consignatario: document.getElementById('consignatario').value,
                ci_consignatario: document.getElementById('ci_consignatario').value,
                producto: document.getElementById('producto').value,
                peso: document.getElementById('peso').value,
                total: document.getElementById('total').value,
                estado: document.getElementById('estado').value,
                fecha: new Date().toLocaleDateString()
            };

            if(data.producto && data.total) {
                set(push(ref(db, 'registros_carga')), data).then(() => {
                    if(confirm("✅ Registrado en Firebase. ¿Deseas imprimir la guía ahora?")) {
                        generarTicket(data);
                    } else {
                        window.location.href = 'guias.html';
                    }
                });
            } else { alert("⚠️ Por favor completa Producto y Total"); }
        };

        function generarTicket(d) {
            const win = window.open('', '', 'width=600,height=800');
            win.document.write(`
                <html><body style="font-family:sans-serif; padding:40px;">
                    <h2 style="text-align:center;">TRANS HUAYNA KAPAC</h2>
                    <p style="text-align:center; border-bottom:1px solid #000; padding-bottom:10px;">GUÍA DE CARGA N° ${d.n_guia}</p>
                    <p><strong>Fecha:</strong> ${d.fecha}</p>
                    <p><strong>Remitente:</strong> ${d.remitente} (CI: ${d.ci_remitente})</p>
                    <p><strong>Consignatario:</strong> ${d.consignatario} (CI: ${d.ci_consignatario})</p>
                    <hr>
                    <p><strong>Producto:</strong> ${d.producto}</p>
                    <p><strong>Peso/Cant:</strong> ${d.peso}</p>
                    <h3>Total: Bs. ${d.total}</h3>
                    <br><br><br>
                    <div style="display:flex; justify-content:space-between;">
                        <div style="border-top:1px solid #000; width:200px; text-align:center;">Firma Despacho</div>
                        <div style="border-top:1px solid #000; width:200px; text-align:center;">Firma Recepción</div>
                    </div>
                </body></html>
            `);
            win.document.close();
            win.print();
            win.close();
            window.location.href = 'guias.html';
        }
    </script>
    <script>
        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    </script>
</body>
</html>
