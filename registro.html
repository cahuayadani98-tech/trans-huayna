<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - TRANS HUAYNA KAPAC</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #374151; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 24px; width: 100%; max-width: 320px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        h1 { color: #111827; font-size: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #e5e7eb; background: #f9fafb; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #facc15; color: #1f2937; font-weight: 800; cursor: pointer; }
        a { display: block; margin-top: 15px; color: #374151; font-size: 13px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <i data-lucide="user-plus" style="margin-bottom: 10px;"></i>
        <h1>Crear Cuenta</h1>
        <input type="text" placeholder="Nombre Completo">
        <input type="password" placeholder="Contraseña">
        <button onclick="location.href='index.html'">REGISTRARSE</button>
        <a href="index.html">¿Ya tienes cuenta? Entrar</a>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
