<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel - TRANS HUAYNA KAPAC</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gris-mate: #374151; --amarillo: #facc15; --blanco: #ffffff; --fondo-app: #1f2937; }
        body { margin: 0; padding: 0; background: var(--fondo-app); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { 
            background: var(--blanco); 
            width: 70px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 5px 0 15px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .sidebar.open { width: 280px; }

        .btn-toggle { 
            padding: 25px; background: none; border: none; cursor: pointer; color: var(--gris-mate);
            display: flex; justify-content: center; width: 100%;
        }
        .sidebar.open .btn-toggle { justify-content: flex-start; padding-left: 25px; }

        .nav-link { 
            display: flex; align-items: center; text-decoration: none; color: #4b5563; 
            height: 60px; transition: 0.2s; overflow: hidden;
        }
        
        .nav-link svg { width: 24px; height: 24px; margin: 0 23px; flex-shrink: 0; stroke-width: 1.5; }

        .nav-text { 
            opacity: 0; visibility: hidden; white-space: nowrap; font-size: 13px; font-weight: 700;
            transition: 0.2s; 
        }
        .sidebar.open .nav-text { opacity: 1; visibility: visible; }

        .nav-link.active { background: #fefce8; color: var(--gris-mate); border-left: 5px solid var(--amarillo); }

        .main-content { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; }
        .main-content h1 { color: var(--amarillo); font-size: 42px; margin: 0; font-weight: 800; line-height: 1; }
    </style>
</head>
<body>

    <nav class="sidebar" id="sidebar">
        <button class="btn-toggle" onclick="toggleMenu()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <div style="flex: 1; margin-top: 20px;">
            <a href="carga.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                <span class="nav-text">REGISTRO DE CARGA</span>
            </a>

            <a href="camiones.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>
                <span class="nav-text">CONTROL DE CAMIONES</span>
            </a>

            <a href="guias.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"/></svg>
                <span class="nav-text">GUIAS</span>
            </a>

            <a href="reportes.html" class="nav-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                <span class="nav-text">REPORTE D REGISTRO</span>
            </a>
        </div>

        <div style="padding: 20px 0; border-top: 1px solid #f3f4f6;">
            <a href="index.html" class="nav-link" style="color: #ef4444;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                <span class="nav-text">SALIR SISTEMA</span>
            </a>
        </div>
    </nav>

    <div class="main-content">
        <h1>TRANS<br>HUAYNA<br>KAPAC</h1>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
