<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Principal - TRANS CK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --azul-oscuro: #2a3b4e;
            --azul-medio: #537d8f;
            --celeste: #8ac9d8;
            --blanco: #ffffff;
            --gris-fondo: #f4f7f6;
            --rojo-error: #e74c3c;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            background-color: var(--gris-fondo);
            color: var(--azul-oscuro);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .user-tag {
            font-size: 13px;
            font-weight: 600;
            color: var(--azul-medio);
            background: rgba(83, 125, 143, 0.1);
            padding: 5px 12px;
            border-radius: 20px;
        }

        .header-section {
            width: 100%;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .subtitle {
            margin: 5px 0 0;
            color: #7f8c8d;
            font-size: 15px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 450px;
        }

        .card-menu {
            background: var(--blanco);
            padding: 25px 10px;
            border-radius: 24px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.03);
            transition: all 0.2s ease;
        }

        .card-menu:active {
            transform: scale(0.96);
            background-color: #fcfcfc;
        }

        .icon-box {
            width: 55px;
            height: 55px;
            background: #f1f5f9;
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
            font-size: 26px;
        }

        .card-menu span {
            font-weight: 700;
            color: var(--azul-oscuro);
            font-size: 14px;
        }

        .logout-section {
            width: 100%;
            max-width: 450px;
            margin-top: 40px;
        }

        .btn-exit {
            width: 100%;
            padding: 16px;
            background: none;
            border: 2px solid var(--rojo-error);
            color: var(--rojo-error);
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <span class="user-tag" id="displayEmail">bcdanikun@gmail.com</span>
        <span style="font-size: 22px;">⚡</span>
    </div>

    <div class="header-section">
        <h1>TRANS CK</h1>
        <p class="subtitle">Gestión de Cargas y Logística</p>
    </div>

    <div class="grid-container">
        <a href="camiones.html" class="card-menu">
            <div class="icon-box">🚚</div>
            <span>Camiones</span>
        </a>

        <a href="guias.html" class="card-menu">
            <div class="icon-box">📝</div>
            <span>Registro</span>
        </a>

        <a href="factura.html" class="card-menu">
            <div class="icon-box">💵</div>
            <span>Facturas</span>
        </a>

        <a href="reportes.html" class="card-menu">
            <div class="icon-box">📈</div>
            <span>Reportes</span>
        </a>
    </div>

    <div class="logout-section">
        <button class="btn-exit" id="btnSignOut">Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Configuración de tu proyecto Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyBtiw8MM-kchif6lCBJkjh9fVfWAAPxqaE",
            authDomain: "registro-8f26e.firebaseapp.com",
            projectId: "registro-8f26e",
            appId: "1:62551766112:web:e59e4b444591a0e7737f05"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Control de acceso: Si no hay usuario, vuelve al login
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('displayEmail').innerText = user.email;
            } else {
                window.location.href = "index.html";
            }
        });

        // Función para salir
        document.getElementById('btnSignOut').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html";
            });
        });
    </script>
</body>
</html>
