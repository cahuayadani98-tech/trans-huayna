<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panel Principal - TRANS CK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --azul: #2a3b4e; --gris: #537d8f; --fondo: #f4f7f6; }
        body { margin: 0; padding: 20px; font-family: 'Inter', sans-serif; background: var(--fondo); display: flex; flex-direction: column; align-items: center; }
        .user-info { width: 100%; display: flex; justify-content: space-between; margin-bottom: 30px; font-size: 14px; font-weight: 600; color: var(--gris); }
        .header { width: 100%; margin-bottom: 30px; }
        h1 { font-size: 28px; font-weight: 800; margin: 0; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 400px; }
        .menu-item { background: white; padding: 25px 15px; border-radius: 24px; text-decoration: none; display: flex; flex-direction: column; align-items: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid #eee; transition: 0.2s; }
        .menu-item:active { transform: scale(0.95); }
        .icon-circle { width: 60px; height: 60px; background: #f0f4f8; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 12px; font-size: 28px; }
        .menu-item span { font-weight: 700; color: var(--azul); font-size: 15px; }
        .btn-logout { margin-top: 40px; width: 100%; max-width: 400px; padding: 18px; background: none; border: 2px solid #e74c3c; color: #e74c3c; border-radius: 15px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="user-info">
        <span id="userEmail">bcdanikun@gmail.com</span>
        <span>🚛</span>
    </div>

    <div class="header">
        <h1>Panel Principal</h1>
        <p style="color:#888; margin:5px 0 0;">TRANS CK Logística</p>
    </div>

    <div class="menu-grid">
        <a href="guias.html" class="menu-item">
    <div class="icon-circle">📝</div>
    <span>Registro</span>
</a> href="camiones.html" class="menu-item">
            <div class="icon-circle">🚚</div>
            <span>Camiones</span>
        </a>

        <a href="registro_carga.html" class="menu-item">
            <div class="icon-circle">📝</div>
            <span>Registro</span>
        </a>

        <a href="factura.html" class="menu-item">
            <div class="icon-circle">💰</div>
            <span>Factura</span>
        </a>

        <a href="reportes.html" class="menu-item">
            <div class="icon-circle">📊</div>
            <span>Reportes</span>
        </a>
    </div>

    <button class="btn-logout" id="btnLogout">CERRAR SESIÓN</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBtiw8MM-kchif6lCBJkjh9fVfWAAPxqaE",
            authDomain: "registro-8f26e.firebaseapp.com",
            projectId: "registro-8f26e",
            appId: "1:62551766112:web:e59e4b444591a0e7737f05"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) document.getElementById('userEmail').innerText = user.email;
            else window.location.href = "index.html";
        });

        document.getElementById('btnLogout').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        });
    </script>
</body>
</html>
