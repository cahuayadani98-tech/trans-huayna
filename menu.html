<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard - TRANS CK</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #2a3b4e; 
            --accent: #8ac9d8; 
            --success: #2ecc71;
            --warning: #f1c40f;
            --bg: #f8fafc;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }
        
        /* Encabezado con Estilo */
        .header { 
            width: 100%; 
            max-width: 400px; 
            padding: 20px 0;
            text-align: left;
        }
        .header h1 { 
            margin: 0; 
            color: var(--primary); 
            font-size: 32px; 
            font-weight: 800; 
            letter-spacing: -1.5px;
        }
        .header span {
            color: var(--accent);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Contenedor de Tarjetas */
        .menu-grid { 
            width: 100%; 
            max-width: 400px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; /* Dos columnas */
            gap: 15px; 
        }

        /* Estilo de Tarjeta Principal (Ancho completo) */
        .card-full { grid-column: span 2; }

        .menu-card {
            background: white;
            padding: 25px 15px;
            border-radius: 24px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(42, 59, 78, 0.06);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Efecto de presión al tocar */
        .menu-card:active { transform: scale(0.95); opacity: 0.9; }

        .icon-bg {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            text-align: center;
            letter-spacing: 0.5px;
        }

        /* Variaciones de Colores Modernos */
        .bg-blue { background: #eef2f3; color: var(--primary); }
        .bg-green { background: #e8f9f1; color: var(--success); }
        .bg-yellow { background: #fef9e7; color: #b7950b; }
        .bg-accent { background: #f0f7f9; color: var(--accent); }

        /* Pie de página */
        .footer-info {
            margin-top: auto;
            padding: 30px 0;
            text-align: center;
            width: 100%;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--success);
            border-radius: 50%;
            margin-right: 5px;
        }
        .footer-info p { font-size: 11px; color: #94a3b8; font-weight: 600; margin: 0; }
    </style>
</head>
<body>

    <div class="header">
        <span>Panel de Control</span>
        <h1>TRANS CK</h1>
    </div>

    <div class="menu-grid">
        
        <a href="guias.html" class="menu-card card-full" style="background: linear-gradient(135deg, var(--primary), #455a71);">
            <div class="icon-bg" style="background: rgba(255,255,255,0.1); color: white;">➕</div>
            <div class="card-title" style="color: white; font-size: 16px;">Nuevo Registro de Carga</div>
        </a>

        <a href="ver_guia.html" class="menu-card">
            <div class="icon-bg bg-accent">🚚</div>
            <div class="card-title">Imprimir<br>Guía</div>
        </a>

        <a href="factura.html" class="menu-card">
            <div class="icon-bg bg-green">📄</div>
            <div class="card-title">Imprimir<br>Factura</div>
        </a>

        <a href="reportes.html" class="menu-card card-full">
            <div class="icon-bg bg-yellow">📊</div>
            <div class="card-title">Reportes y Exportación Excel</div>
        </a>

    </div>

    <div class="footer-info">
        <p><span class="status-dot"></span> SISTEMA ACTIVO - EL ALTO, BOLIVIA</p>
        <p style="margin-top: 5px; opacity: 0.5;">v2.0 Beta 2026</p>
    </div>

</body>
</html>
